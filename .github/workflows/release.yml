name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(cat VERSION)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"

          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ github.event.inputs.bump }}"
              exit 1
              ;;
          esac

          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "${NEXT_VERSION}" > VERSION
          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        run: |
          set -euo pipefail
          git add VERSION
          git commit -m "chore: release v${{ steps.version.outputs.next_version }}"

      - name: Create and push tag
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: "Automated release for dep-alpha."

      - name: Notify consumer-alpha
        env:
          TARGET_REPO: ${{ secrets.CONSUMER_ALPHA_REPO }}
          DISPATCH_TOKEN: ${{ secrets.CONSUMER_REPO_PAT }}
          VERSION_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_REPO}" ] || [ -z "${DISPATCH_TOKEN}" ]; then
            echo "Missing required secrets: CONSUMER_ALPHA_REPO or CONSUMER_REPO_PAT"
            exit 1
          fi

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            "https://api.github.com/repos/${TARGET_REPO}/dispatches" \
            -d "{\"event_type\":\"dep-alpha-released\",\"client_payload\":{\"version\":\"${VERSION_TAG}\"}}"
